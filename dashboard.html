<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | StartupWeb</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-orange': '#ea580c',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50">
    <div class="dashboard-layout relative overflow-hidden flex h-screen w-full">
        <!-- Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 lg:hidden hidden transition-opacity"></div>

        <!-- Sidebar -->
        <aside id="sidebar-menu"
            class="sidebar fixed inset-y-0 left-0 z-50 w-64 transform -translate-x-full lg:relative lg:translate-x-0 transition duration-300 ease-in-out flex flex-col bg-[#1a1a1a] h-full shadow-xl lg:shadow-none">
            <div class="sidebar-header flex justify-between items-center px-6 py-5 border-b border-[#333]">
                <a href="index.html"
                    class="text-2xl font-bold tracking-tighter text-white font-outfit hover:text-brand-orange transition-colors block">Startup<span
                        class="text-brand-orange">Web</span></a>
                <button id="close-sidebar"
                    class="lg:hidden text-gray-400 hover:text-white p-1 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-orange">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <nav class="sidebar-nav flex-1 py-4 flex flex-col gap-1 w-full">
                <a href="#" class="nav-item active"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</a>
                <a href="#profile" class="nav-item"><i data-lucide="user" class="w-5 h-5"></i> Profile</a>
                <a href="#" class="nav-item logout-link"><i data-lucide="log-out" class="w-5 h-5"></i> Logout</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content flex-1 h-screen overflow-y-auto w-full lg:w-[calc(100%-16rem)] max-w-full">
            <!-- Mobile Header -->
            <div
                class="lg:hidden flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <div class="flex items-center gap-3">
                    <button id="mobile-menu-btn"
                        class="text-gray-600 hover:text-brand-orange focus:outline-none p-2 -ml-2 rounded-md transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <a href="index.html"
                        class="text-2xl font-bold tracking-tighter text-gray-900 font-outfit hover:text-brand-orange transition-colors block">Startup<span
                            class="text-brand-orange">Web</span></a>
                </div>
                <a href="#"
                    class="text-gray-600 logout-link p-2 rounded-md hover:bg-gray-100 hover:text-brand-orange transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </a>
            </div>

            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 id="welcome-msg" class="text-2xl font-bold text-gray-800">Welcome, User</h1>
                    <p id="member-since" class="text-gray-500 text-sm">Member since ...</p>
                </div>
            </div>

            <div id="dashboard-message" class="hidden mb-6"></div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Profile Card -->
                <div class="lg:col-span-1">
                    <div class="card h-full">
                        <h2 class="text-lg font-bold mb-4 uppercase tracking-wide border-b pb-2">Profile Details</h2>
                        <form id="profile-form">
                            <div class="mb-4">
                                <label class="block text-gray-700 text-xs font-bold mb-2 uppercase">Email (Read
                                    Only)</label>
                                <input type="email" id="email" name="email" value=""
                                    class="w-full bg-gray-100 p-3 rounded border border-gray-200" readonly>
                            </div>
                            <div class="mb-4">
                                <label class="block text-gray-700 text-xs font-bold mb-2 uppercase">Full Name</label>
                                <input type="text" id="name" name="name" value=""
                                    class="w-full bg-white p-3 rounded border border-gray-200 focus:outline-none focus:border-brand-orange"
                                    required>
                            </div>
                            <div class="mb-6">
                                <label class="block text-gray-700 text-xs font-bold mb-2 uppercase">New Password
                                    (Optional)</label>
                                <input type="password" id="password" name="password"
                                    placeholder="Leave blank to keep current"
                                    class="w-full bg-white p-3 rounded border border-gray-200 focus:outline-none focus:border-brand-orange">
                            </div>
                            <button type="submit"
                                class="w-full bg-zinc-900 text-white py-3 font-bold uppercase tracking-widest text-sm rounded hover:bg-brand-orange transition-colors">Update
                                Profile</button>
                        </form>
                    </div>
                </div>

                <!-- Activity Log -->
                <div class="lg:col-span-2">
                    <div class="card h-full">
                        <h2 class="text-lg font-bold mb-4 uppercase tracking-wide border-b pb-2">Recent Activity</h2>
                        <div class="table-container">
                            <table id="activity-logs">
                                <thead>
                                    <tr>
                                        <th>Action</th>
                                        <th>Details</th>
                                        <th>Time</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/dashboard.js"></script>
    <script>
        lucide.createIcons();

        // Mobile Menu Logic
        document.addEventListener('DOMContentLoaded', () => {
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const closeBtn = document.getElementById('close-sidebar');
            const sidebar = document.getElementById('sidebar-menu');
            const overlay = document.getElementById('sidebar-overlay');
            const navItems = document.querySelectorAll('.nav-item');

            function toggleMenu() {
                if (sidebar) sidebar.classList.toggle('-translate-x-full');
                if (overlay) overlay.classList.toggle('hidden');
                document.body.classList.toggle('overflow-hidden');
            }

            if (mobileBtn) mobileBtn.addEventListener('click', toggleMenu);
            if (closeBtn) closeBtn.addEventListener('click', toggleMenu);
            if (overlay) overlay.addEventListener('click', toggleMenu);

            // Close menu when a navigation item is clicked on mobile
            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    if (window.innerWidth < 1024 && sidebar && !sidebar.classList.contains('-translate-x-full')) {
                        toggleMenu();
                    }
                });
            });
        });
    </script>
</body>

</html>
