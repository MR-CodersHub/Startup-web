<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | StartupWeb</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-orange': '#ff6b00',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50">
    <div class="dashboard-layout relative overflow-hidden flex h-screen w-full">
        <!-- Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 lg:hidden hidden transition-opacity"></div>

        <!-- Sidebar -->
        <aside id="sidebar-menu"
            class="sidebar fixed inset-y-0 left-0 z-50 w-64 transform -translate-x-full lg:relative lg:translate-x-0 transition duration-300 ease-in-out flex flex-col bg-[#1a1a1a] h-full shadow-xl lg:shadow-none">
            <div class="sidebar-header flex justify-between items-center px-6 py-5 border-b border-[#333]">
                <a href="index.html"
                    class="text-2xl font-bold tracking-tighter text-white font-outfit hover:text-brand-orange transition-colors">Startup<span
                        class="text-brand-orange">Web</span></a>
                <button id="close-sidebar"
                    class="lg:hidden text-gray-400 hover:text-white p-1 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-orange">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <nav class="sidebar-nav flex-1 py-4 flex flex-col gap-1 w-full">
                <a href="#stats" class="nav-item active"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Admin
                    Dashboard</a>
                <a href="#users" class="nav-item"><i data-lucide="users" class="w-5 h-5"></i> Users</a>
                <a href="#logs" class="nav-item"><i data-lucide="file-text" class="w-5 h-5"></i> Activity Logs</a>
                <a href="#" class="nav-item logout-link"><i data-lucide="log-out" class="w-5 h-5"></i>
                    Logout</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content flex-1 h-screen overflow-y-auto w-full lg:w-[calc(100%-16rem)] max-w-full">
            <div
                class="lg:hidden flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <div class="flex items-center gap-3">
                    <button id="mobile-menu-btn"
                        class="text-gray-600 hover:text-brand-orange focus:outline-none p-2 -ml-2 rounded-md transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <a href="index.html"
                        class="text-xl font-bold text-gray-800 hover:text-brand-orange transition-colors">Admin
                        Panel</a>
                </div>
                <a href="#"
                    class="text-gray-600 logout-link p-2 rounded-md hover:bg-gray-100 hover:text-brand-orange transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </a>
            </div>

            <div class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-bold text-gray-800">Administrator Overview</h1>
            </div>

            <div id="dashboard-message"
                class="hidden bg-blue-100 border border-blue-400 text-blue-700 px-4 py-3 rounded mb-6"></div>

            <!-- Stats Grid -->
            <div id="stats" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="card stat-card bg-gradient-to-r from-zinc-800 to-zinc-900 text-white">
                    <div>
                        <p class="text-sm font-bold uppercase tracking-widest text-gray-400">Total Users</p>
                        <p id="stat-total-users" class="text-3xl font-bold">0</p>
                    </div>
                    <i data-lucide="users" class="w-8 h-8 text-brand-orange"></i>
                </div>
                <div class="card stat-card bg-white">
                    <div>
                        <p class="text-sm font-bold uppercase tracking-widest text-gray-500">Active Users</p>
                        <p id="stat-active-users" class="text-3xl font-bold text-green-600">0</p>
                    </div>
                    <i data-lucide="activity" class="w-8 h-8 text-green-600"></i>
                </div>
                <div class="card stat-card bg-white">
                    <div>
                        <p class="text-sm font-bold uppercase tracking-widest text-gray-500">Activities (24h)</p>
                        <p id="stat-activities" class="text-3xl font-bold text-brand-orange">0</p>
                    </div>
                    <i data-lucide="clock" class="w-8 h-8 text-brand-orange"></i>
                </div>
            </div>

            <!-- Users Table -->
            <div id="users" class="card mb-8">
                <div class="flex justify-between items-center mb-4 border-b pb-4">
                    <h2 class="text-lg font-bold uppercase tracking-wide">Registered Users</h2>
                </div>
                <div class="table-container">
                    <table id="users-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Global Logs -->
            <div id="logs" class="card">
                <h2 class="text-lg font-bold mb-4 uppercase tracking-wide border-b pb-2">System Activity Log</h2>
                <div class="table-container">
                    <table id="logs-table">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Action</th>
                                <th>Details</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/admin_dashboard.js"></script>
    <script>
        lucide.createIcons();

        // Mobile Menu Logic
        document.addEventListener('DOMContentLoaded', () => {
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const closeBtn = document.getElementById('close-sidebar');
            const sidebar = document.getElementById('sidebar-menu');
            const overlay = document.getElementById('sidebar-overlay');
            const navItems = document.querySelectorAll('.nav-item');

            function toggleMenu() {
                if (sidebar) sidebar.classList.toggle('-translate-x-full');
                if (overlay) overlay.classList.toggle('hidden');
                document.body.classList.toggle('overflow-hidden');
            }

            if (mobileBtn) mobileBtn.addEventListener('click', toggleMenu);
            if (closeBtn) closeBtn.addEventListener('click', toggleMenu);
            if (overlay) overlay.addEventListener('click', toggleMenu);

            // Close menu when a navigation item is clicked on mobile
            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    if (window.innerWidth < 1024 && sidebar && !sidebar.classList.contains('-translate-x-full')) {
                        toggleMenu();
                    }
                });
            });
        });
    </script>
</body>

</html>
